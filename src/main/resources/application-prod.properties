# Production Profile Configuration

# Database Configuration for Production
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:beautyonwheel_prod}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA Configuration for Production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging for Production
logging.level.root=WARN
logging.level.com.beautyonwheel=INFO
logging.level.org.springframework.security=WARN

# JWT Secret from environment variable (MUST be set in production)
app.jwt.secret=${JWT_SECRET:}

# CORS origins for the deployed frontend (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# HTTPS is normally terminated by the hosting provider. Enable only when using a JVM keystore.
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE_PATH:}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=PKCS12
