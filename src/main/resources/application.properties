# Application Configuration
spring.application.name=beautyonwheel-auth-service
spring.profiles.default=dev
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.com.beautyonwheel=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# PostgreSQL Configuration (Default for development)
spring.datasource.url=jdbc:postgresql://localhost:5432/beautyonwheel_db
spring.datasource.username=postgres
spring.datasource.password=C#@ndu951
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JWT Configuration
app.jwt.secret=your-super-secret-key-min-32-characters-required-for-security-and-production
app.jwt.expiration=86400000

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
